<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>MediaVault — Revisione Cover</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
.wrap{width:100%;max-width:480px}
header{text-align:center;margin-bottom:14px}
h1{font-family:Georgia,serif;font-size:22px;letter-spacing:2px;color:#f0a500;text-transform:uppercase}
.sub{font-size:12px;color:#7a7a9a;margin-top:4px}
.progress-bar{width:100%;height:6px;background:#1c1c3a;border-radius:4px;margin:14px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#f0a500);transition:width .25s}
.stats{display:flex;justify-content:space-between;font-size:11px;color:#7a7a9a;margin-bottom:6px}
.card{background:#13132b;border:1px solid #1c1c3a;border-radius:14px;padding:16px;margin-bottom:14px}
.film-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:2px}
.film-id{font-size:11px;color:#55556a;margin-bottom:12px;font-family:monospace}
.versions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.ver{position:relative;width:31%;min-width:90px;border-radius:8px;overflow:hidden;border:2px solid #2a2a4a;cursor:pointer;background:#1c1c3a;transition:border-color .15s,transform .15s}
.ver img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.ver.selected{border-color:#22c55e;transform:scale(1.02)}
.ver .badge{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.65);color:#a78bfa;font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600}
.ver .current{position:absolute;top:4px;right:4px;background:rgba(240,165,0,.85);color:#0a0a1a;font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700}
.actions{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:11px;border-radius:8px;border:1px solid #2a2a4a;background:#1c1c3a;color:#e8e8f0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn.none{color:#f87171;border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.1)}
.btn.skip{color:#7a7a9a}
.nav{display:flex;gap:8px;margin-top:10px}
.nav button{flex:1;padding:10px;border-radius:8px;border:1px solid #2a2a4a;background:#13132b;color:#a0a0c0;font-size:13px;cursor:pointer;font-family:inherit}
.nav button:disabled{opacity:.35}
footer{margin-top:18px;width:100%}
.export-btn{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(167,139,250,.3);background:rgba(167,139,250,.12);color:#a78bfa;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
textarea{width:100%;margin-top:10px;height:160px;background:#13132b;color:#a0a0c0;border:1px solid #1c1c3a;border-radius:8px;padding:10px;font-family:monospace;font-size:11px}
.done{text-align:center;padding:40px 16px;color:#7a7a9a;font-size:14px}
.jump{display:flex;gap:8px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.jump button{padding:6px 10px;border-radius:6px;border:1px solid #2a2a4a;background:#13132b;color:#7a7a9a;font-size:11px;cursor:pointer;font-family:inherit}
.jump button.active{color:#f0a500;border-color:#f0a500}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Revisione Cover</h1>
  <div class="sub">MediaVault — scegli la cover corretta per ogni film</div>
</header>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="stats"><span id="statsText"></span><span id="statsCount"></span></div>
<div id="cardArea"></div>
<div class="nav">
  <button id="prevBtn">← Precedente</button>
  <button id="nextBtn">Successiva →</button>
</div>
<div class="jump" id="jumpArea"></div>
<footer>
  <button class="export-btn" id="exportBtn">📤 Esporta risultati</button>
  <textarea id="output" style="display:none" readonly></textarea>
</footer>
</div>

, "https://image.tmdb.org/t/p/w500/eF70CZqzmUEolTqNKn5ohWoGqEJ.jpg"], "year": ""}, {"id": "f378", "title": "Wild Tales", "versions": ["https://image.tmdb.org/t/p/w500/1UCFVUVM4EW9dYEO4fCf9nfj2bU.jpg", "https://image.tmdb.org/t/p/w500/6BPXX9BBT79YYdHQRfz3sZQ8KIX.jpg"], "year": ""}, {"id": "f379", "title": "The Wizard of Lies", "versions": ["https://image.tmdb.org/t/p/w500/c16Fkbl7FXSB1r3CtlZ4oMW9IYA.jpg", "https://image.tmdb.org/t/p/w500/eqG5NiHDzMlnPkuGSIHLEXxuqoN.jpg"], "year": ""}, {"id": "f380", "title": "The Zone of Interest", "versions": ["https://image.tmdb.org/t/p/w500/hHWqJy5hO8MCMxMEOPMaBsBjiFl.jpg", "https://image.tmdb.org/t/p/w500/hAmiqHoHADke0OYMM4LiXWIZPeO.jpg", "https://image.tmdb.org/t/p/w500/hUu9zyZmKuDuNF9mEbBwNmXieeq.jpg"], "year": ""}, {"id": "f381", "title": "Fracture", "versions": ["https://image.tmdb.org/t/p/w500/coss7RgL0NH6g4voiK6MoDzRIPe.jpg", "https://image.tmdb.org/t/p/w500/7I6fZOOaJNRJ0x8JkHTjsqxgUYv.jpg", "https://image.tmdb.org/t/p/w500/e62UMFIyBGPSMRCRGf9IakXKt7q.jpg"], "year": ""}, {"id": "f384", "title": "The Invisible Guest", "versions": ["https://image.tmdb.org/t/p/w500/r4IHBEQxhBdFrS7bz1VpHHF4VDCO.jpg", "https://image.tmdb.org/t/p/w500/sGnvCB4CrxaGOIYCwFSoHlhUoE5.jpg", "https://image.tmdb.org/t/p/w500/cAfFIyLDPL5ykT5JtmRXTAQ5e6P.jpg"], "year": ""}, {"id": "f386", "title": "A Separation", "versions": ["https://image.tmdb.org/t/p/w500/9BKHnEzCf9rr5nFYJyXWrYzA2aB.jpg", "https://image.tmdb.org/t/p/w500/gEhpJNkGKFuGJToQNZxTRuMKh2l.jpg", "https://image.tmdb.org/t/p/w500/6A3IPkpAKNVEKBQ8KiSqLGzZpvB.jpg"], "year": ""}, {"id": "f389", "title": "Shoplifters", "versions": ["https://image.tmdb.org/t/p/w500/wFGCjTe8ZVXGR5PaQWN1ArlNfbB.jpg", "https://image.tmdb.org/t/p/w500/mh7iKjdGOcSSPCOfuHqbREJjIb5.jpg"], "year": ""}, {"id": "f391", "title": "The Killing of a Sacred Deer", "versions": ["https://image.tmdb.org/t/p/w500/u7amsKLwNxm9p3hnpz6MKCZH4dP.jpg", "https://image.tmdb.org/t/p/w500/vXN7CZPzMFJRfGEAjNbWQLDJb7.jpg", "https://image.tmdb.org/t/p/w500/oExzFZ2BZDG2oT0kcFjFJJ0FJxY.jpg"], "year": ""}, {"id": "f392", "title": "8 Mile", "versions": ["https://image.tmdb.org/t/p/w500/8P3yWvKjvYBRApU4KD35hFMuShv.jpg", "https://image.tmdb.org/t/p/w500/7AkqJDNiQkHNlSQMYBk3zv8JRen.jpg", "https://image.tmdb.org/t/p/w500/5YrRFnhU8jVuGhCvzMB3CknVMJF.jpg"], "year": ""}, {"id": "f393", "title": "Willy Wonka & the Chocolate Factory", "versions": ["https://image.tmdb.org/t/p/w500/yg2BPLXrJFVNIe3p7BaBfH8r7tT.jpg", "https://image.tmdb.org/t/p/w500/rbBQi7rxMHGPFQ8gGUbBNYxSHs9.jpg", "https://image.tmdb.org/t/p/w500/jWBpCsWxHqFD3gy3Ml2PilPBCWD.jpg"], "year": ""}];
const STORE_KEY='cover-review-v1';
let progress={}; // id -> {choice:'v0'|'v1'|'v2'|'none'|'skip'}
let idx=0;

async function loadProgress(){
  try{
    const r=await window.storage.get(STORE_KEY,false);
    if(r&&r.value) progress=JSON.parse(r.value);
  }catch(e){}
}
async function saveProgress(){
  try{ await window.storage.set(STORE_KEY,JSON.stringify(progress),false); }catch(e){}
}

function render(){
  const item=DATA[idx];
  const area=document.getElementById('cardArea');
  if(!item){ area.innerHTML='<div class="done">Tutti i film sono stati revisionati 🎉<br>Premi "Esporta risultati" per scaricare le scelte.</div>'; updateStats(); renderJump(); return; }
  const sel=progress[item.id]?.choice;
  const lastIdx=item.versions.length-1;
  let html='<div class="card"><div class="film-title">'+esc(item.title)+(item.year?' <span style="color:#7a7a9a;font-weight:400">('+item.year+')</span>':'')+'</div>';
  html+='<div class="film-id">'+item.id+' — '+item.versions.length+' versioni</div>';
  html+='<div class="versions">';
  item.versions.forEach((url,i)=>{
    const verKey='v'+i;
    const isSel=sel===verKey;
    const isCurrent=i===lastIdx;
    html+='<div class="ver'+(isSel?' selected':'')+'" onclick="choose(\''+verKey+'\')">'+
      '<span class="badge">v'+(i+1)+'</span>'+
      (isCurrent?'<span class="current">ATTUALE</span>':'')+
      '<img src="'+url+'" loading="lazy" onerror="this.style.opacity=0.2">'+
      '</div>';
  });
  html+='</div>';
  html+='<div class="actions">';
  html+='<button class="btn none" onclick="choose(\'none\')">'+(sel==='none'?'✓ ':'')+'Nessuna è corretta</button>';
  html+='<button class="btn skip" onclick="choose(\'skip\')">'+(sel==='skip'?'✓ ':'')+'Salta</button>';
  html+='</div></div>';
  area.innerHTML=html;
  updateStats();
  renderJump();
}

function esc(s){ return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function choose(choice){
  const item=DATA[idx];
  progress[item.id]={choice};
  await saveProgress();
  if(idx<DATA.length-1){ idx++; render(); }
  else render();
}

function updateStats(){
  const total=DATA.length;
  const done=Object.keys(progress).length;
  document.getElementById('statsText').textContent='Film '+(Math.min(idx+1,total))+' di '+total;
  document.getElementById('statsCount').textContent=done+' completati';
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
  document.getElementById('prevBtn').disabled=idx<=0;
  document.getElementById('nextBtn').disabled=idx>=total-1;
}

function renderJump(){
  // show jump buttons only to nearest unreviewed
  const jump=document.getElementById('jumpArea');
  const nextUnreviewed=DATA.findIndex((d,i)=>i>idx&&!progress[d.id]);
  jump.innerHTML='';
  if(nextUnreviewed>=0){
    const b=document.createElement('button');
    b.textContent='Vai al prossimo non revisionato →';
    b.onclick=()=>{idx=nextUnreviewed; render();};
    jump.appendChild(b);
  }
}

document.getElementById('prevBtn').onclick=()=>{ if(idx>0){idx--; render();} };
document.getElementById('nextBtn').onclick=()=>{ if(idx<DATA.length-1){idx++; render();} };

document.getElementById('exportBtn').onclick=()=>{
  const result={};
  DATA.forEach(item=>{
    const p=progress[item.id];
    if(!p||p.choice==='skip') return;
    if(p.choice==='none'){ result[item.id]={title:item.title,choice:'none'}; return; }
    const vIdx=parseInt(p.choice.slice(1));
    result[item.id]={title:item.title,url:item.versions[vIdx]};
  });
  const out=document.getElementById('output');
  out.style.display='block';
  out.value=JSON.stringify(result,null,1);
  out.select();
};

(async()=>{
  await loadProgress();
  // jump to first unreviewed on load
  const firstUnreviewed=DATA.findIndex(d=>!progress[d.id]);
  idx=firstUnreviewed>=0?firstUnreviewed:0;
  render();
})();
</script>
